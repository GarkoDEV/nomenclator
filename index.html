<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1, viewport-fit=cover">

    <title>Nomenclátor de Tráfico</title>

    <meta name="description"
          content="Consulta rápida del nomenclátor de infracciones de tráfico">

    <meta name="theme-color"
          content="#2563eb">

    <link rel="icon"
          href="icons/favicon.png">

    <!-- Google Fonts -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
          rel="stylesheet">

    <!-- Material Symbols -->

    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0">

    <!-- CSS -->

    <link rel="stylesheet"
          href="css/styles.css">

    <link rel="stylesheet"
          href="css/charts.css">

</head>

<body>

<div class="app">

    <!-- ========================================= -->
    <!-- HEADER -->
    <!-- ========================================= -->

    <header class="header">

        <div class="header-left">

            <div class="logo">🚔</div>

            <div class="header-text">

                <h1>Nomenclátor</h1>

                <p id="resultsCounter">Cargando...</p>

            </div>

        </div>

        <div class="header-actions">

            <button
                id="chartsBtn"
                class="icon-button charts-button"
                aria-label="Ver gráficos"
                title="Gráficos">

                <span class="material-symbols-rounded">bar_chart</span>

            </button>

            <button
                id="favoritesBtn"
                class="icon-button favorites-button"
                aria-label="Ver favoritos"
                title="Mis favoritos (0)">

                <span class="material-symbols-rounded">favorite</span>
                <span class="badge-count">0</span>

            </button>

            <button
                id="themeButton"
                class="icon-button theme-button"
                aria-label="Cambiar tema"
                title="Cambiar tema">

                <span class="material-symbols-rounded">dark_mode</span>

            </button>

        </div>

    </header>

    <!-- ========================================= -->
    <!-- ESTADÍSTICAS -->
    <!-- ========================================= -->

    <section id="statsSection" class="stats-section">

        <div class="stat-card">
            <div class="stat-icon">📋</div>
            <div class="stat-content">
                <span class="stat-label">Total</span>
                <strong id="statTotal" class="stat-value">0</strong>
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-icon">💰</div>
            <div class="stat-content">
                <span class="stat-label">Importe Promedio</span>
                <strong id="statAvgPrice" class="stat-value">0€</strong>
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-icon">📍</div>
            <div class="stat-content">
                <span class="stat-label">Puntos Máx</span>
                <strong id="statMaxPoints" class="stat-value">0</strong>
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-icon">⭐</div>
            <div class="stat-content">
                <span class="stat-label">Favoritos</span>
                <strong id="statFavorites" class="stat-value">0</strong>
            </div>
        </div>

    </section>

    <!-- ========================================= -->
    <!-- GRÁFICOS (COLLAPSIBLE) -->
    <!-- ========================================= -->

    <section id="chartsSection" class="charts-section hidden">

        <div class="charts-container">

            <div class="chart-wrapper">
                <h3>Infracciones por Norma</h3>
                <canvas id="normaChart" class="chart-canvas"></canvas>
            </div>

            <div class="chart-wrapper">
                <h3>Importe Promedio por Norma</h3>
                <canvas id="priceChart" class="chart-canvas"></canvas>
            </div>

        </div>

    </section>

    <!-- ========================================= -->
    <!-- BUSCADOR -->
    <!-- ========================================= -->

    <section class="search-box">

        <span class="material-symbols-rounded">search</span>

        <input
            id="searchInput"
            type="search"
            placeholder="Buscar artículo o palabra..."
            autocomplete="off">

        <button
            id="clearSearch"
            class="clear-button"
            aria-label="Limpiar búsqueda"
            title="Limpiar">

            <span class="material-symbols-rounded">close</span>

        </button>

    </section>

    <!-- ========================================= -->
    <!-- FILTROS BÁSICOS -->
    <!-- ========================================= -->

    <section id="filters" class="filters"></section>

    <!-- ========================================= -->
    <!-- BUSCADOR AVANZADO -->
    <!-- ========================================= -->

    <div class="advanced-search-toggle">
        <button class="toggle-btn" id="advancedToggle" aria-label="Alternar búsqueda avanzada">
            <span>Búsqueda avanzada</span>
            <span class="toggle-icon material-symbols-rounded">expand_more</span>
        </button>
    </div>

    <section id="advancedSearch" class="advanced-search hidden">

        <div class="advanced-filters">

            <div class="filter-group">
                <label>Importe: <span id="priceLabel">0€ - 1000€</span></label>
                <input type="range" id="priceSlider" class="slider" min="0" max="1000" value="1000">
            </div>

            <div class="filter-group">
                <label>Puntos: <span id="pointsLabel">0 - 15</span></label>
                <input type="range" id="pointsSlider" class="slider" min="0" max="15" value="15">
            </div>

        </div>

    </section>

    <!-- ========================================= -->
    <!-- HISTORIAL DE BÚSQUEDAS -->
    <!-- ========================================= -->

    <section id="historySection" class="hidden">
        <h2 style="margin-bottom: 12px; font-size: 0.875rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600;">Búsquedas recientes</h2>
        <div id="historyList" class="history-list"></div>
    </section>

    <!-- ========================================= -->
    <!-- RESULTADOS -->
    <!-- ========================================= -->

    <main id="results" class="results"></main>

    <!-- ========================================= -->
    <!-- ESTADO VACÍO -->
    <!-- ========================================= -->

    <section id="emptyState" class="empty hidden">

        <span class="material-symbols-rounded empty-icon">search_off</span>

        <h2>Sin resultados</h2>

        <p>Prueba otra búsqueda.</p>

    </section>

</div>

<!-- ========================================= -->
<!-- BOTÓN FLOTANTE (SCROLL TOP) -->
<!-- ========================================= -->

<button
    id="scrollTop"
    class="fab hidden"
    aria-label="Subir">

    <span class="material-symbols-rounded">keyboard_arrow_up</span>

</button>

<!-- ========================================= -->
<!-- TOAST NOTIFICATIONS -->
<!-- ========================================= -->

<div id="toastContainer"></div>

<!-- ========================================= -->
<!-- SCRIPTS -->
<!-- ========================================= -->

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>

<!-- App Principal -->
<script src="js/app.js"></script>

</body>

</html>
