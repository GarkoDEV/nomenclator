<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1, viewport-fit=cover">

    <title>Nomenclátor de Tráfico</title>

    <meta name="description"
          content="Consulta rápida del nomenclátor de infracciones de tráfico">

    <meta name="theme-color"
          content="#2563eb">

    <link rel="icon"
          href="icons/favicon.png">

    <!-- Google Fonts -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
          rel="stylesheet">

    <!-- Material Symbols -->

    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0">

    <!-- CSS -->

    <link rel="stylesheet"
          href="css/styles.css">

</head>

<body>

<div class="app">

    <!-- ========================================= -->
    <!-- HEADER -->
    <!-- ========================================= -->

    <header class="header">

        <div class="header-left">

            <div class="logo">

                🚔

            </div>

            <div class="header-text">

                <h1>Nomenclátor</h1>

                <p id="resultsCounter">Cargando...</p>

            </div>

        </div>

        <button
            id="themeButton"
            class="icon-button theme-button"
            aria-label="Cambiar tema"
            title="Cambiar tema">

            <span class="material-symbols-rounded">dark_mode</span>

        </button>

    </header>

    <!-- ========================================= -->
    <!-- BUSCADOR -->
    <!-- ========================================= -->

    <section class="search-box">

        <span class="material-symbols-rounded">search</span>

        <input
            id="searchInput"
            type="search"
            placeholder="Buscar artículo o palabra..."
            autocomplete="off">

        <button
            id="clearSearch"
            class="clear-button"
            aria-label="Limpiar búsqueda"
            title="Limpiar">

            <span class="material-symbols-rounded">close</span>

        </button>

    </section>

    <!-- ========================================= -->
    <!-- FILTROS -->
    <!-- ========================================= -->

    <section
        id="filters"
        class="filters">

        <!-- Generado por JavaScript -->

    </section>

    <!-- ========================================= -->
    <!-- RESULTADOS -->
    <!-- ========================================= -->

    <main
        id="results"
        class="results">

    </main>

    <!-- ========================================= -->
    <!-- ESTADO VACÍO -->
    <!-- ========================================= -->

    <section
        id="emptyState"
        class="empty hidden">

        <span class="material-symbols-rounded empty-icon">search_off</span>

        <h2>Sin resultados</h2>

        <p>Prueba otra búsqueda o selecciona otro filtro</p>

    </section>

</div>

<!-- ========================================= -->
<!-- BOTÓN FLOTANTE -->
<!-- ========================================= -->

<button
    id="scrollTop"
    class="fab hidden"
    aria-label="Subir al inicio"
    title="Subir">

    <span class="material-symbols-rounded">keyboard_arrow_up</span>

</button>

<!-- ========================================= -->
<!-- TEMPLATE CARD -->
<!-- ========================================= -->

<template id="cardTemplate">

    <article class="card">

        <button class="card-header">

            <div class="card-main">

                <div class="card-top">

                    <span class="badge"></span>

                    <span class="severity-indicator"></span>

                </div>

                <h2 class="article"></h2>

                <p class="preview"></p>

            </div>

            <div class="price-box">

                <div class="price"></div>

                <span class="expand-icon material-symbols-rounded">expand_more</span>

            </div>

        </button>

        <div class="card-body">

            <div class="detail-grid">

                <div class="detail-item">

                    <span class="detail-label">Norma</span>

                    <strong class="detailNorma"></strong>

                </div>

                <div class="detail-item">

                    <span class="detail-label">Artículo</span>

                    <strong class="detailArticulo"></strong>

                </div>

                <div class="detail-item">

                    <span class="detail-label">Apartado</span>

                    <strong class="detailApartado"></strong>

                </div>

                <div class="detail-item">

                    <span class="detail-label">Opción</span>

                    <strong class="detailOpcion"></strong>

                </div>

            </div>

            <div class="description-section">

                <p class="description"></p>

            </div>

            <div class="price-grid">

                <div class="price-item">

                    <span class="price-label">Importe</span>

                    <strong class="importe"></strong>

                </div>

                <div class="price-item">

                    <span class="price-label">Reducido</span>

                    <strong class="reducido"></strong>

                </div>

                <div class="price-item points-item">

                    <span class="price-label">Puntos</span>

                    <strong class="puntos"></strong>

                </div>

            </div>

        </div>

    </article>

</template>

<!-- ========================================= -->
<!-- TOAST -->
<!-- ========================================= -->

<div id="toast" class="toast"></div>

<!-- ========================================= -->
<!-- JAVASCRIPT -->
<!-- ========================================= -->

<script defer src="js/app.js"></script>

</body>

</html>
