<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1, viewport-fit=cover">

    <title>Nomenclátor de Tráfico</title>

    <meta name="description"
          content="Consulta rápida del nomenclátor de infracciones de tráfico">

    <meta name="theme-color"
          content="#2563eb">

    <link rel="icon"
          href="icons/favicon.png">

    <!-- Google Fonts -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
          rel="stylesheet">

    <!-- Material Symbols -->

    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0">

    <!-- CSS -->

    <link rel="stylesheet"
          href="css/styles.css">

</head>

<body>

<div class="app">

    <!-- ========================================= -->
    <!-- HEADER -->
    <!-- ========================================= -->

    <header class="header">

        <div class="header-left">

            <div class="logo">🚔</div>

            <div class="header-text">

                <h1>Nomenclátor</h1>

                <p id="resultsCounter">Cargando...</p>

            </div>

        </div>

        <div class="header-actions">

            <button
                id="chartsBtn"
                class="icon-button charts-button"
                aria-label="Ver gráficos"
                title="Gráficos">

                <span class="material-symbols-rounded">bar_chart</span>

            </button>

            <button
                id="favoritesBtn"
                class="icon-button favorites-button"
                aria-label="Ver favoritos"
                title="Mis favoritos (0)">

                <span class="material-symbols-rounded">favorite</span>
                <span class="badge-count">0</span>

            </button>

            <button
                id="themeButton"
                class="icon-button theme-button"
                aria-label="Cambiar tema"
                title="Cambiar tema">

                <span class="material-symbols-rounded">dark_mode</span>

            </button>

        </div>

    </header>

    <!-- ========================================= -->
    <!-- ESTADÍSTICAS -->
    <!-- ========================================= -->

    <section id="statsSection" class="stats-section">

        <div class="stat-card">
            <div class="stat-icon">📋</div>
            <div class="stat-content">
                <span class="stat-label">Total</span>
                <strong id="statTotal" class="stat-value">0</strong>
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-icon">💰</div>
            <div class="stat-content">
                <span class="stat-label">Importe Promedio</span>
                <strong id="statAvgPrice" class="stat-value">0€</strong>
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-icon">📍</div>
            <div class="stat-content">
                <span class="stat-label">Puntos Máx</span>
                <strong id="statMaxPoints" class="stat-value">0</strong>
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-icon">⭐</div>
            <div class="stat-content">
                <span class="stat-label">Favoritos</span>
                <strong id="statFavorites" class="stat-value">0</strong>
            </div>
        </div>

    </section>

    <!-- ========================================= -->
    <!-- GRÁFICOS (COLLAPSIBLE) -->
    <!-- ========================================= -->

    <section id="chartsSection" class="charts-section hidden">

        <div class="charts-container">

            <div class="chart-wrapper">
                <h3>Infracciones por Norma</h3>
                <canvas id="normaChart" class="chart-canvas"></canvas>
            </div>

            <div class="chart-wrapper">
                <h3>Importe Promedio por Norma</h3>
                <canvas id="priceChart" class="chart-canvas"></canvas>
            </div>

        </div>

    </section>

    <!-- ========================================= -->
    <!-- BUSCADOR -->
    <!-- ========================================= -->

    <section class="search-box">

        <span class="material-symbols-rounded">search</span>

        <input
            id="searchInput"
            type="search"
            placeholder="Buscar artículo o palabra..."
            autocomplete="off">

        <button
            id="clearSearch"
            class="clear-button"
            aria-label="Limpiar búsqueda"
            title="Limpiar">

            <span class="material-symbols-rounded">close</span>

        </button>

    </section>

    <!-- ========================================= -->
    <!-- FILTROS BÁSICOS -->
    <!-- ========================================= -->

    <section id="filters" class="filters"></section>

    <!-- ========================================= -->
    <!-- BUSCADOR AVANZADO (COLLAPSIBLE) -->
    <!-- ========================================= -->

    <div class="advanced-search-toggle">

        <button id="advancedToggle" class="toggle-btn">
            <span class="material-symbols-rounded">tune</span>
            Búsqueda avanzada
            <span class="material-symbols-rounded toggle-icon">expand_more</span>
        </button>

    </div>

    <section id="advancedSearch" class="advanced-search hidden">

        <div class="advanced-filters">

            <div class="filter-group">
                <label for="priceRange">Rango de importe: <span id="priceValue">0€ - 1000€</span></label>
                <input
                    type="range"
                    id="priceRange"
                    class="slider"
                    min="0"
                    max="1000"
                    value="1000"
                    step="50">
            </div>

            <div class="filter-group">
                <label for="pointsRange">Rango de puntos: <span id="pointsValue">0 - 6</span></label>
                <input
                    type="range"
                    id="pointsRange"
                    class="slider"
                    min="0"
                    max="6"
                    value="6"
                    step="1">
            </div>

            <div class="filter-group checkbox">
                <label for="severeOnly">
                    <input type="checkbox" id="severeOnly">
                    <span>Solo infracciones graves (>4 puntos)</span>
                </label>
            </div>

            <button id="resetAdvanced" class="btn-reset">Limpiar filtros</button>

        </div>

    </section>

    <!-- ========================================= -->
    <!-- HISTORIAL DE BÚSQUEDAS -->
    <!-- ========================================= -->

    <div id="searchHistory" class="search-history hidden">
        <span class="history-label">Búsquedas recientes:</span>
        <div id="historyChips" class="history-chips"></div>
    </div>

    <!-- ========================================= -->
    <!-- RESULTADOS -->
    <!-- ========================================= -->

    <main id="results" class="results"></main>

    <!-- ========================================= -->
    <!-- ESTADO VACÍO -->
    <!-- ========================================= -->

    <section id="emptyState" class="empty hidden">

        <span class="material-symbols-rounded empty-icon">search_off</span>

        <h2>Sin resultados</h2>

        <p>Prueba otra búsqueda o ajusta los filtros</p>

    </section>

</div>

<!-- ========================================= -->
<!-- BOTÓN FLOTANTE -->
<!-- ========================================= -->

<button
    id="scrollTop"
    class="fab hidden"
    aria-label="Subir al inicio"
    title="Subir">

    <span class="material-symbols-rounded">keyboard_arrow_up</span>

</button>

<!-- ========================================= -->
<!-- TEMPLATE CARD -->
<!-- ========================================= -->

<template id="cardTemplate">

    <article class="card">

        <button class="card-header">

            <div class="card-main">

                <div class="card-top">

                    <span class="badge"></span>

                    <span class="severity-indicator"></span>

                </div>

                <h2 class="article"></h2>

                <p class="preview"></p>

            </div>

            <div class="price-box">

                <div class="price"></div>

                <span class="expand-icon material-symbols-rounded">expand_more</span>

            </div>

        </button>

        <button class="favorite-btn" aria-label="Añadir a favoritos" title="Favorito">
            <span class="material-symbols-rounded">favorite</span>
        </button>

        <div class="card-body">

            <div class="detail-grid">

                <div class="detail-item">
                    <span class="detail-label">Norma</span>
                    <strong class="detailNorma"></strong>
                </div>

                <div class="detail-item">
                    <span class="detail-label">Artículo</span>
                    <strong class="detailArticulo"></strong>
                </div>

                <div class="detail-item">
                    <span class="detail-label">Apartado</span>
                    <strong class="detailApartado"></strong>
                </div>

                <div class="detail-item">
                    <span class="detail-label">Opción</span>
                    <strong class="detailOpcion"></strong>
                </div>

            </div>

            <div class="description-section">
                <p class="description"></p>
            </div>

            <div class="price-grid">

                <div class="price-item">
                    <span class="price-label">Importe</span>
                    <strong class="importe"></strong>
                </div>

                <div class="price-item">
                    <span class="price-label">Reducido</span>
                    <strong class="reducido"></strong>
                </div>

                <div class="price-item points-item">
                    <span class="price-label">Puntos</span>
                    <strong class="puntos"></strong>
                </div>

            </div>

            <div class="card-actions">
                <button class="action-btn copy-btn" title="Copiar">
                    <span class="material-symbols-rounded">content_copy</span>
                    Copiar
                </button>
                <button class="action-btn share-btn" title="Compartir">
                    <span class="material-symbols-rounded">share</span>
                    Compartir
                </button>
            </div>

        </div>

    </article>

</template>

<!-- ========================================= -->
<!-- TOAST -->
<!-- ========================================= -->

<div id="toast" class="toast"></div>

<!-- ========================================= -->
<!-- CHART.JS -->
<!-- ========================================= -->

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<!-- ========================================= -->
<!-- JAVASCRIPT -->
<!-- ========================================= -->

<script defer src="js/app.js"></script>

</body>

</html>
