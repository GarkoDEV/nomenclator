<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width,initial-scale=1,viewport-fit=cover">

    <meta name="theme-color" content="#0F172A">

    <meta name="color-scheme" content="dark light">

    <meta name="description"
        content="Consulta rápida del nomenclátor de infracciones de tráfico.">

    <title>Nomenclátor de Tráfico</title>

    <!-- PWA -->

    <link rel="manifest" href="manifest.json">

    <link rel="icon"
        href="icons/favicon.png">

    <link rel="apple-touch-icon"
        href="icons/icon-192.png">

    <!-- Google Fonts -->

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Material Symbols -->

    <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />

    <!-- CSS -->

    <link rel="stylesheet"
        href="css/styles.css">

</head>

<body data-theme="dark">

<div class="app">

<header class="header">

    <div class="header-row">

        <div class="brand">

            <div class="logo">

                🚔

            </div>

            <div>

                <h1>

                    Nomenclátor

                </h1>

                <p id="totalResults">

                    Cargando infracciones...

                </p>

            </div>

        </div>

        <button

            id="themeToggle"

            class="icon-button"

            aria-label="Cambiar tema"

            title="Cambiar tema">

            <span
                id="themeIcon"
                class="material-symbols-rounded">

                dark_mode

            </span>

        </button>

    </div>



    <div class="search-box">

        <span
            class="material-symbols-rounded search-icon">

            search

        </span>

        <input

            id="searchInput"

            type="search"

            placeholder="Buscar artículo, texto, importe, puntos..."

            autocomplete="off"

            spellcheck="false">

        <button

            id="clearSearch"

            class="clear-search"

            aria-label="Limpiar búsqueda">

            <span
                class="material-symbols-rounded">

                close

            </span>

        </button>

    </div>



    <div class="filters">

        <button
            class="filter active"
            data-filter="TODOS">

            Todos

        </button>

        <button
            class="filter"
            data-filter="RGC">

            RGC

        </button>

        <button
            class="filter"
            data-filter="RGV">

            RGV

        </button>

        <button
            class="filter"
            data-filter="RGCOND">

            RGCOND

        </button>

        <button
            class="filter"
            data-filter="LSV">

            LSV

        </button>

    </div>

</header>

<main
    id="results"
    class="results">

    </main>

<!-- ==========================================================
     ESTADO VACÍO
=========================================================== -->

<section id="emptyState" class="empty hidden">

    <div class="empty-content">

        <span class="material-symbols-rounded empty-icon">

            search_off

        </span>

        <h2>

            No se han encontrado resultados

        </h2>

        <p>

            Prueba a buscar por artículo, texto, importe o selecciona otra norma.

        </p>

        <button
            id="resetFilters"
            class="primary-button">

            Mostrar todas las infracciones

        </button>

    </div>

</section>

<!-- ==========================================================
     BOTÓN VOLVER ARRIBA
=========================================================== -->

<button
    id="scrollTop"
    class="fab hidden"
    aria-label="Volver arriba">

    <span class="material-symbols-rounded">

        keyboard_arrow_up

    </span>

</button>

<!-- ==========================================================
     BARRA INFERIOR
=========================================================== -->

<nav class="bottom-nav">

    <button class="nav-button active">

        <span class="material-symbols-rounded">

            home

        </span>

        <span>

            Inicio

        </span>

    </button>

    <button class="nav-button">

        <span class="material-symbols-rounded">

            star

        </span>

        <span>

            Favoritos

        </span>

    </button>

    <button class="nav-button">

        <span class="material-symbols-rounded">

            history

        </span>

        <span>

            Recientes

        </span>

    </button>

    <button class="nav-button">

        <span class="material-symbols-rounded">

            settings

        </span>

        <span>

            Ajustes

        </span>

    </button>

</nav>

<!-- ==========================================================
     TEMPLATE TARJETA
=========================================================== -->

<template id="cardTemplate">

    <article class="card">

        <button class="card-header">

            <div class="card-info">

                <span class="badge"></span>

                <h3 class="article"></h3>

            </div>

            <div class="card-price"></div>

        </button>

        <div class="card-preview"></div>

        <div class="card-body">

            <div class="card-content">

                <div class="detail-grid">

                    <div class="detail-item">

                        <span>

                            Norma

                        </span>

                    <strong class="detail-norma"></strong>

                </div>

                <div class="detail-item">

                    <span>

                        Artículo

                    </span>

                    <strong class="detail-articulo"></strong>

                </div>

                <div class="detail-item">

                    <span>

                        Apartado

                    </span>

                    <strong class="detail-apartado"></strong>

                </div>

                <div class="detail-item">

                    <span>

                        Opción

                    </span>

                    <strong class="detail-opcion"></strong>

                </div>

            </div>

            <div class="description"></div>

            <div class="price-panel">

                <div>

                    <span>

                        Importe

                    </span>

                    <strong class="importe"></strong>

                </div>

                <div>

                    <span>

                        Reducción

                    </span>

                    <strong class="importeReducido"></strong>

                </div>

                <div class="points-circle">

                    <span>

                        Puntos

                    </span>

                    <strong class="puntos"></strong>

                </div>

            </div>

            <div class="card-actions">

                <button class="action-btn copy-btn">

                    <span class="material-symbols-rounded">

                        content_copy

                    </span>

                    Copiar

                </button>

                <button class="action-btn share-btn">

                    <span class="material-symbols-rounded">

                        share

                    </span>

                    Compartir

                </button>

                <button class="action-btn favorite-btn">

                    <span class="material-symbols-rounded">

                        star

                    </span>

                    Favorito

                </button>

            </div>

        </div>

    </article>

</template>

</div>

<script src="js/app.js"></script>

</body>

</html>
