<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width,initial-scale=1,viewport-fit=cover">

    <title>Nomenclátor de Tráfico</title>

    <meta
        name="description"
        content="Consulta rápida del nomenclátor de infracciones de tráfico">

    <meta
        name="theme-color"
        content="#0F172A">

    <link
        rel="icon"
        href="icons/favicon.png">

    <!-- Google Font -->

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Material Symbols -->

    <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0">

    <link
        rel="stylesheet"
        href="css/styles.css">

</head>

<body>

<div id="app">

    <!-- =========================
         HEADER
    ========================== -->

    <header class="header">

        <div class="brand">

            <div class="brand-icon">

                🚔

            </div>

            <div>

                <h1>Nomenclátor</h1>

                <p id="statsText">

                    Cargando...

                </p>

            </div>

        </div>

        <button
            id="themeButton"
            class="icon-button"
            aria-label="Cambiar tema">

            <span class="material-symbols-rounded">

                dark_mode

            </span>

        </button>

    </header>

    <!-- =========================
         BUSCADOR
    ========================== -->

    <section class="search">

        <span class="material-symbols-rounded">

            search

        </span>

        <input
            id="searchInput"
            type="search"
            placeholder="Buscar artículo o palabra...">

        <button
            id="clearSearch">

            <span class="material-symbols-rounded">

                close

            </span>

        </button>

    </section>

    <!-- =========================
         FILTROS
    ========================== -->

    <section
        id="filters"
        class="chips">

    </section>

    <!-- =========================
         RESULTADOS
    ========================== -->

    <main
        id="results"
        class="results">

    </main>

    <!-- =========================
         ESTADO VACÍO
    ========================== -->

    <section
        id="empty"
        class="empty hidden">

        <span class="material-symbols-rounded">

            search_off

        </span>

        <h2>

            Sin resultados

        </h2>

        <p>

            Prueba otra búsqueda.

        </p>

    </section>

</div>

<!-- =========================
     BARRA INFERIOR
========================== -->

<nav class="bottomBar">

    <button class="active">

        <span class="material-symbols-rounded">

            home

        </span>

        <small>Inicio</small>

    </button>

    <button>

        <span class="material-symbols-rounded">

            star

        </span>

        <small>Favoritos</small>

    </button>

    <button>

        <span class="material-symbols-rounded">

            history

        </span>

        <small>Recientes</small>

    </button>

    <button>

        <span class="material-symbols-rounded">

            settings

        </span>

        <small>Ajustes</small>

    </button>

</nav>

<!-- =========================
     MODAL
========================== -->

<div
    id="modal"
    class="modal hidden">

    <div
        id="modalContent"
        class="modal-content">

    </div>

</div>

<!-- =========================
     TOAST
========================== -->

<div
    id="toast"
    class="toast">

</div>

<script defer src="js/app.js"></script>

</body>

</html>
